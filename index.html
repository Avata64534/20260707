<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多啦A夢足球世界</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft JhengHei",sans-serif;
}

body{
    background:#e8f9ff;
}

header{
    background:#00AEEF;
    color:white;
    text-align:center;
    padding:25px;
}

header h1{
    font-size:40px;
}

nav{
    background:white;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:30px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

nav a{
    text-decoration:none;
    color:#0077aa;
    font-weight:bold;
}

.banner{
    height:350px;
    background:linear-gradient(#87CEFA,#B0E8FF);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.banner h2{
    font-size:48px;
    color:#004466;
}

.banner p{
    font-size:22px;
    margin-top:15px;
}

button{
    margin-top:20px;
    padding:12px 30px;
    background:#ff4444;
    color:white;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}

section{
    padding:50px;
}

.title{
    text-align:center;
    color:#0088cc;
    margin-bottom:30px;
    font-size:35px;
}

.cards{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.card{
    width:280px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 20px rgba(0,0,0,.15);
    transition:.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
}

.card h3{
    padding:15px;
    color:#0088cc;
}

.card p{
    padding:0 15px 20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#00AEEF;
    color:white;
}

th,td{
    padding:15px;
    text-align:center;
    border:1px solid #ddd;
}

footer{
    background:#00AEEF;
    color:white;
    text-align:center;
    padding:20px;
}
</style>

</head>
